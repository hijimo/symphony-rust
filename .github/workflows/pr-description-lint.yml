name: pr-description-lint

on:
  pull_request:
    types: [opened, edited, reopened, synchronize, ready_for_review]

permissions:
  contents: read

jobs:
  validate-pr-description:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Validate PR description format
        env:
          PR_BODY_JSON: ${{ toJson(github.event.pull_request.body) }}
        run: |
          printf '%s' "$PR_BODY_JSON" | jq -r '.' > /tmp/pr_body.md
          test -s /tmp/pr_body.md
          grep -Eq '(^|[[:space:]])(Closes|Fixes|Resolves|Refs) #[0-9]+' /tmp/pr_body.md
          grep -Eq '^## Summary' /tmp/pr_body.md
          grep -Eq '^## Validation' /tmp/pr_body.md
